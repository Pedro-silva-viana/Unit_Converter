<!DOCTYPE html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Unit converter</title>
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>
    <body>
        <h1>Unit converter</h1>
        <div class="converter-tabs">
            <a href="/length" class="tab-item active">Length</a>
            <a href="/temperature" class="tab-item">Temperature</a>
            <a href="/weight" class="tab-item">Weight</a>
        </div>
        <p> Enter length to convert</p>
        <form action="/questionL" method="GET">
            <input type="number" name="inputValue" step="any" required>

            <select name="fromUnit">
                <option value="mm">Millimeter</option>
                <option value="cm">Centimeter</option>
                <option value="m">Meter</option>
                <option value="km">Kilometer</option>
                <option value="in">Inch</option>
                <option value="ft">Foot</option>
                <option value="yd">Yard</option>
                <option value="mi">Mile</option>
            </select>

            <select name="toUnit">
                <option value="mm">Millimeter</option>
                <option value="cm">Centimeter</option>
                <option value="m">Meter</option>
                <option value="km">Kilometer</option>
                <option value="in">Inch</option>
                <option value="ft">Foot</option>
                <option value="yd">Yard</option>
                <option value="mi">Mile</option>
            </select>

            <button type="submit" class="but">Convert</button>
        </form>
    </body>
</html>
